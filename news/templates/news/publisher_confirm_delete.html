{% extends "news/base.html" %}
{% block title %}Delete Publisher{% endblock %}
{% block content %}
<h2>Delete "{{ publisher.name }}"?</h2>
<p class="text-muted">
    This cannot be undone. Articles that belong to this publisher will remain
    but will no longer be linked to any publisher.
</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Yes, delete this publisher</button>
    <a href="{% url 'publisher-detail' publisher.pk %}" class="btn btn-secondary ms-2">Cancel</a>
</form>
{% endblock %}
